<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ログイン - Eternal Fantasy</title>
  <link rel="stylesheet" href="../css/login.css" />
  <script type="module" src="../js/firebase.js"></script>
  <script type="module">
    import { auth } from "../js/firebase.js";
    import {
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    window.login = async () => {
      const email = document.getElementById("email").value;
      const pass = document.getElementById("password").value;
      const msg = document.getElementById("msg");

      try {
        await signInWithEmailAndPassword(auth, email, pass);
        msg.textContent = "ログイン成功";
        msg.className = "success";
        setTimeout(() => location.href = "../index.html", 800);
      } catch (e) {
        msg.textContent = "ログイン失敗：" + e.message;
        msg.className = "error";
      }
    };
  </script>
</head>

<body>
  <div id="app">
    <h1>Eternal Fantasy</h1>

    <input id="email" type="email" placeholder="メールアドレス" />
    <input id="password" type="password" placeholder="パスワード" />

    <button onclick="login()">ログイン</button>

    <p id="msg"></p>

    <div id="nav">
      <a href="./register.html">新規登録</a> |
      <a href="./reset_password.html">パスワード再設定</a> |
      <a href="../index.html">戻る</a>
    </div>
  </div>
</body>
</html>
