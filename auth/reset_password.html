<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>パスワード再設定 - Eternal Fantasy</title>

  <link rel="stylesheet" href="../css/login.css" />

  <!-- Firebase 初期化 -->
  <script type="module" src="../js/firebase.js"></script>

  <script type="module">
    import { auth } from "../js/firebase.js";
    import {
      sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    window.resetPassword = async () => {
      const email = document.getElementById("email").value;
      const msg = document.getElementById("msg");

      try {
        await sendPasswordResetEmail(auth, email);
        msg.textContent = "パスワード再設定メールを送信しました。";
        msg.className = "success";
      } catch (e) {
        msg.textContent = "送信失敗：" + e.message;
        msg.className = "error";
      }
    };
  </script>
</head>

<body>
  <div id="app">
    <h1>Eternal Fantasy</h1>

    <p>登録メールアドレスを入力してください。</p>

    <input id="email" type="email" placeholder="メールアドレス" />

    <button onclick="resetPassword()">再設定メールを送信</button>

    <p id="msg"></p>

    <div id="nav">
      <a href="./login.html">ログイン</a> |
      <a href="./register.html">新規登録</a> |
      <a href="../index.html">戻る</a>
    </div>
  </div>
</body>
</html>
