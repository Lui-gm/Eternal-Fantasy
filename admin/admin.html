<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Eternal Fantasy 管理画面</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    display: flex;
    height: 100vh;
    background: #f5f5f5;
  }

  #sidebar {
    width: 240px;
    background: #1e1e1e;
    color: white;
    padding: 20px;
    box-sizing: border-box;
  }

  .menu-item {
    padding: 10px 0;
    cursor: pointer;
    border-bottom: 1px solid #333;
  }

  .menu-item:hover {
    color: #00c3ff;
  }

  #content {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  #header {
    height: 60px;
    background: white;
    border-bottom: 1px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
  }

  #main {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
  }

  #logout {
    padding: 8px 16px;
    background: #ff4d4d;
    color: white;
    border: none;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- ★ Firebase Auth のみで認証するガード -->
<script>
  if (localStorage.getItem("isAdmin") !== "true") {
    location.href = "./login.html";
  }
</script>

<div id="sidebar">
  <h2>管理メニュー</h2>

  <div class="menu-item" data-page="dashboard">ダッシュボード</div>
  <div class="menu-item" data-page="skills">スキル管理</div>
  <div class="menu-item" data-page="weapons">武器管理</div>
  <div class="menu-item" data-page="users">ユーザー管理</div>
  <div class="menu-item" data-page="logs">ログ閲覧</div>

  <button id="logout" onclick="logout()">ログアウト</button>
</div>

<div id="content">
  <div id="header">
    <div id="pageTitle">ダッシュボード</div>
    <div>管理者：紬稀</div>
  </div>

  <div id="main"></div>
</div>

<!-- Firebase 初期化（Auth + Firestore） -->
<script type="module" src="../js/firebase.js"></script>

<!-- 認証処理（Firebase Auth のみ） -->
<script type="module" src="./auth.js"></script>

<!-- ★ ページ切り替え（Firestore を使う pages/*.js が動く） -->
<script type="module" src="./main.js"></script>

</body>
</html>
