<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>管理画面</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }
    header {
      background: #333;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #logoutBtn {
      background: #e53935;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <header>
    <h2>管理画面</h2>
    <button id="logoutBtn">ログアウト</button>
  </header>

  <main>
    <!-- ここに管理画面の内容 -->
  </main>

  <!-- Firebase 初期化は firebase.js に一本化 -->
  <script type="module" src="../js/firebase.js?v=3"></script>

  <!-- 管理画面の処理 -->
  <script type="module">
    import { auth } from "../js/firebase.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // ★ ログアウト処理
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      try {
        await signOut(auth);

        // ログインフラグ削除
        localStorage.removeItem("isAdmin");

        // ★ ゲーム本体へ遷移
        location.href = "/index.html";

      } catch (err) {
        console.error("ログアウト失敗:", err);
      }
    });
  </script>

</body>
</html>
