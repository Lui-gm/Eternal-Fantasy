<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Eternal Fantasy 管理画面</title>
<style>
  body {
    margin: 0;
    font-family: sans-serif;
    display: flex;
    height: 100vh;
    background: #f5f5f5;
  }

  /* 左サイドバー */
  #sidebar {
    width: 240px;
    background: #1e1e1e;
    color: white;
    padding: 20px;
    box-sizing: border-box;
  }

  #sidebar h2 {
    margin-top: 0;
    font-size: 20px;
  }

  .menu-item {
    padding: 10px 0;
    cursor: pointer;
    border-bottom: 1px solid #333;
  }

  .menu-item:hover {
    color: #00c3ff;
  }

  /* メインエリア */
  #content {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* 上部ヘッダー */
  #header {
    height: 60px;
    background: white;
    border-bottom: 1px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    box-sizing: border-box;
  }

  #main {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
  }

  #logout {
    padding: 8px 16px;
    background: #ff4d4d;
    color: white;
    border: none;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- 左サイドバー -->
<div id="sidebar">
  <h2>管理メニュー</h2>

  <div class="menu-item" onclick="window.loadPage('dashboard')">ダッシュボード</div>
  <div class="menu-item" onclick="window.loadPage('skills')">スキル管理</div>
  <div class="menu-item" onclick="window.loadPage('weapons')">武器管理</div>
  <div class="menu-item" onclick="window.loadPage('summons')">召喚石管理</div>
  <div class="menu-item" onclick="window.loadPage('characters')">キャラ管理</div>
  <div class="menu-item" onclick="window.loadPage('enemies')">敵データ管理</div>
  <div class="menu-item" onclick="window.loadPage('gacha')">ガチャ管理</div>
  <div class="menu-item" onclick="window.loadPage('events')">イベント管理</div>
  <div class="menu-item" onclick="window.loadPage('users')">ユーザー管理</div>
  <div class="menu-item" onclick="window.loadPage('logs')">ログ閲覧</div>
  <div class="menu-item" onclick="window.loadPage('notices')">通知送信</div>
  <div class="menu-item" onclick="window.loadPage('maintenance')">メンテナンス</div>
  <div class="menu-item" onclick="window.loadPage('debug')">デバッグ</div>
  <div class="menu-item" onclick="window.loadPage('settings')">設定</div>

  <button id="logout" onclick="logout()">ログアウト</button>
</div>

<!-- 右側：ヘッダー + メイン -->
<div id="content">
  <div id="header">
    <div id="pageTitle">ダッシュボード</div>
    <div>管理者：紬稀</div>
  </div>

  <div id="main">
    <!-- ページ内容がここに読み込まれる -->
  </div>
</div>

<!-- ★ Firebase 初期化（絶対必要） -->
<script type="module" src="../js/firebase.js"></script>

<!-- ★ 認証チェック（db を export する auth.js） -->
<script type="module" src="auth.js"></script>

<!-- ★ ページ切り替え -->
<script type="module">
  window.loadPage = async (page) => {
    document.getElementById("pageTitle").innerText = page;

    const main = document.getElementById("main");

    try {
      const module = await import(`./pages/${page}.js`);
      module.loadPage(main);
    } catch (e) {
      main.innerHTML = `<h2>ページが存在しません: ${page}</h2>`;
    }
  };

  // 初期ページ
  loadPage("dashboard");
</script>

</body>
</html>
